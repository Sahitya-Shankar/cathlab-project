<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>360 VR Project</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

 <!-- Custom Popup Layer -->
<div id="popup">

    <div class="popup-content">

        <!-- Background Design Image -->
        <img src="assets/popup-design.png" alt="Popup Design" class="popup-bg">

        <!-- Close Button -->
        <button id="closeBtn">✕</button>

        <!-- Video Container -->
        <div class="video-wrapper">

            <video id="popupVideo" controls>
                <source src="assets/intro.mp4" type="video/mp4">
            </video>

        </div>

    </div>

</div>

  <!-- VR Scene -->
  <a-scene cursor="rayOrigin: mouse">

    <!-- 360 Panorama -->
    <a-sky
      src="assets/panorama.png"
      rotation="0 -90 0">
    </a-sky>

    <!-- Camera -->
    <a-entity
      camera
      look-controls
      position="0 1.6 0">
    </a-entity>

    <!-- Hotspot -->
    <a-image
      id="hotspot1"
      src="assets/hotspot.png"
      position="3 1 -6"
      width="0.3"
      height="0.3"
      class="clickable"
   
      animation="
        property: scale;
        to: 1.2 1.2 1.2;
        dir: alternate;
        dur: 1000;
        loop: true">
    </a-image>
<!--Hotspot 2-->
     <a-image
      id="hotspot2"
      src="assets/hotspot.png"
      position="1 3 -3"
      width="0.3"
      height="0.3"
      class="clickable"
   
      animation="
        property: scale;
        to: 1.2 1.2 1.2;
        dir: alternate;
        dur: 1000;
        loop: true">
    </a-image>
    
<!--Hotspot3-->
    
     <a-image
      id="hotspot3"
      src="assets/hotspot.png"
      position="-2 1 -3"
      width="0.3"
      height="0.3"
      class="clickable"
   
      animation="
        property: scale;
        to: 1.2 1.2 1.2;
        dir: alternate;
        dur: 1000;
        loop: true">
    </a-image>
  </a-scene>

  <script src="script.js"></script>

</body>
</html>
